<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scoreboard Control</title>

<style>
body{
font-family:Arial;
padding:20px;
}

button{
width:100%;
padding:15px;
margin:5px 0;
font-size:20px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
font-size:18px;
}
</style>
</head>

<body>

<h2>Football Scoreboard Control</h2>

<input id="home" placeholder="Home Team">

<input id="away" placeholder="Away Team">

<button onclick="saveTeams()">Save Team Names</button>

<button onclick="homePlus()">HOME +1</button>

<button onclick="awayPlus()">AWAY +1</button>

<script>
function saveTeams(){
alert("Team Name Save Feature Next Step");
}

function homePlus(){
alert("Home Goal +1 Next Step");
}

function awayPlus(){
alert("Away Goal +1 Next Step");
}
</script>

</body>
</html>
