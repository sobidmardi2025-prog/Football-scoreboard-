<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
font-family:Arial;
padding:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
font-size:18px;
}

button{
width:100%;
padding:15px;
font-size:20px;
margin:10px 0;
}
</style>
</head>

<body>

<h2>Football Scoreboard Admin</h2>

<input id="home" placeholder="Home Team">

<input id="away" placeholder="Away Team">

<button onclick="saveTeams()">Save Team Names</button>

<script>

const supabase = window.supabase.createClient(
"https://dhmlppbxsstnohurrvbg.supabase.co",
"sb_publishable_dkZDjzR4yJJr563b7wh3eA_tTl3gNni"
);

async function saveTeams(){

const home=document.getElementById("home").value;
const away=document.getElementById("away").value;

await supabase
.from("match_data")
.update({
home_team:home,
away_team:away
})
.eq("id",1);

alert("Saved");

}

</script>

</body>
</html>
